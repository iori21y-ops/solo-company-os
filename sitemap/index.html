<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>렌테일러 사이트맵</title>
<style>
:root{
  --bg:#0e1116; --panel:#171b22; --panel2:#1e232c; --line:#2a313c; --line2:#39424f;
  --txt:#e6e9ee; --muted:#9aa4b2; --muted2:#6b7480;
  --customer:#4aa3ff; --erp:#ff9f45; --infra:#8b93a7;
  --supabase:#3ecf8e; --api:#5b8dff; --external:#c084fc; --static:#f5c451; --hardcoded:#ff6b81; --none:#5a6472; --fs:#7dd3c0;
  --hi:#ffe27a; --danger:#ff6b81;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Roboto,sans-serif;
  overflow:hidden;overscroll-behavior:none}
button{font-family:inherit}
#app{position:fixed;inset:0;display:flex;flex-direction:column}

header{padding:8px 10px;background:var(--panel);border-bottom:1px solid var(--line);z-index:5}
.hrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.title{font-weight:700;font-size:15px;letter-spacing:-.2px}
.title small{color:var(--muted);font-weight:500;font-size:11px;margin-left:6px}
.spacer{flex:1}
.ctrl{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
input[type=search]{background:var(--panel2);border:1px solid var(--line2);color:var(--txt);
  border-radius:8px;padding:6px 9px;font-size:13px;min-width:130px;outline:none}
input[type=search]:focus{border-color:var(--api)}
.tog{background:var(--panel2);border:1px solid var(--line2);color:var(--muted);
  border-radius:20px;padding:5px 11px;font-size:12px;cursor:pointer;user-select:none;white-space:nowrap}
.tog.on{color:#fff}
.tog[data-g=customer].on{background:rgba(74,163,255,.22);border-color:var(--customer);color:#bcdcff}
.tog[data-g=erp].on{background:rgba(255,159,69,.20);border-color:var(--erp);color:#ffd9ad}
.tog[data-g=infra].on{background:rgba(139,147,167,.22);border-color:var(--infra);color:#d6dae2}
.tog.prob.on{background:rgba(255,107,129,.20);border-color:var(--danger);color:#ffc2cc}
.tog.plain.on{background:rgba(255,255,255,.10);border-color:var(--line2);color:#fff}

.findings{display:flex;gap:7px;overflow-x:auto;padding:8px 10px;background:var(--panel);
  border-bottom:1px solid var(--line);-webkit-overflow-scrolling:touch;z-index:5}
.finding{flex:0 0 auto;max-width:260px;background:var(--panel2);border:1px solid var(--line2);
  border-left:3px solid var(--muted2);border-radius:8px;padding:6px 9px;cursor:pointer;font-size:12px}
.finding.high{border-left-color:var(--danger)} .finding.med{border-left-color:var(--static)} .finding.low{border-left-color:var(--infra)}
.finding.active{outline:2px solid var(--hi);background:#22262f}
.finding b{display:block;color:#fff;font-size:12px;font-weight:600;margin-bottom:2px}
.finding span{color:var(--muted);font-size:11px;line-height:1.35;display:block;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.stage{position:relative;flex:1;min-height:0}
canvas{display:block;width:100%;height:100%;touch-action:none}

.legend{position:absolute;left:10px;bottom:10px;background:rgba(23,27,34,.92);border:1px solid var(--line);
  border-radius:10px;padding:8px 10px;font-size:11px;z-index:3;max-width:46vw}
.legend h4{margin:0 0 5px;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.lg{display:flex;align-items:center;gap:6px;margin:2px 0;color:var(--muted)}
.dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.lg .ring{width:12px;height:12px;border-radius:50%;border:2px solid;background:transparent}
.legend .sep{height:1px;background:var(--line);margin:6px 0}

.hint{position:absolute;right:10px;bottom:10px;background:rgba(23,27,34,.85);border:1px solid var(--line);
  border-radius:8px;padding:6px 9px;font-size:10.5px;color:var(--muted2);z-index:3}

#panel{position:absolute;top:0;right:0;height:100%;width:340px;max-width:90vw;background:var(--panel);
  border-left:1px solid var(--line);transform:translateX(102%);transition:transform .22s ease;z-index:8;
  display:flex;flex-direction:column;box-shadow:-8px 0 24px rgba(0,0,0,.35)}
#panel.open{transform:translateX(0)}
.phead{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:8px}
.phead .gtag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;margin-top:2px}
.phead h3{margin:0;font-size:16px;font-weight:700;line-height:1.25}
.phead .idsub{color:var(--muted2);font-size:11px;font-family:ui-monospace,Menlo,monospace;margin-top:3px;word-break:break-all}
.pclose{margin-left:auto;background:var(--panel2);border:1px solid var(--line2);color:var(--muted);
  width:28px;height:28px;border-radius:8px;font-size:16px;cursor:pointer;flex:0 0 auto}
.pbody{padding:12px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.sect{margin-bottom:14px}
.sect h5{margin:0 0 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.role{font-size:13.5px;line-height:1.5;color:var(--txt)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11.5px;padding:3px 8px;border-radius:7px;background:var(--panel2);border:1px solid var(--line2);color:var(--muted)}
.chip.src{border-left:3px solid var(--none)}
.chip.link{cursor:pointer;color:#bcdcff;border-color:var(--line2)}
.chip.link:hover{background:#22303f}
.feat{display:flex;align-items:center;gap:7px;font-size:12.5px;margin:3px 0;color:var(--txt)}
.st{font-size:10px;padding:1px 6px;border-radius:5px;font-weight:600}
.st.live{background:rgba(62,207,142,.18);color:#7fe6b6} .st.partial{background:rgba(245,196,81,.18);color:#f5d98a}
.st.disabled{background:rgba(255,107,129,.16);color:#ffb3bf} .st.todo{background:rgba(139,147,167,.18);color:#c3c9d4}
.st.preview{background:rgba(91,141,255,.18);color:#a9c4ff}
.notes{font-size:12.5px;line-height:1.55;color:#d5dae2;background:var(--panel2);border:1px solid var(--line2);
  border-radius:8px;padding:9px 10px;white-space:pre-wrap}
.notes.warn{border-color:rgba(255,107,129,.4)}
.edgeItem{font-size:12px;line-height:1.5;padding:7px 0;border-top:1px solid var(--line)}
.edgeItem .ek{color:var(--hi);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.edgeItem .ep{color:#bcdcff;font-family:ui-monospace,monospace;font-size:11px;word-break:break-all}
.empty{color:var(--muted2);font-size:12px;font-style:italic}

.viewtog{display:flex;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;overflow:hidden;margin-left:10px}
.vtog{padding:6px 11px;font-size:12.5px;cursor:pointer;color:var(--muted);user-select:none;white-space:nowrap}
.vtog.on{background:var(--api);color:#fff}

#gallery{display:none;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 48px;background:var(--bg)}
#app.gallery #gallery{display:block}
#app.gallery .stage{display:none}
.gsec{margin-bottom:22px;max-width:1100px}
.gsec h2{font-size:14px;font-weight:700;color:var(--txt);margin:0 0 10px;padding-bottom:6px;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.gsec h2 .gcount{font-size:11px;color:var(--muted2);font-weight:500;background:var(--panel2);
  border:1px solid var(--line2);border-radius:20px;padding:1px 8px}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:10px}
.gcard{position:relative;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;
  overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s}
.gcard:active{border-color:var(--api);transform:scale(.98)}
.gcard .thumb{width:100%;height:150px;object-fit:cover;object-position:top center;display:block;background:#0b0e13}
.gcard .cap{padding:6px 8px;font-size:11.5px;line-height:1.3;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcard .gbadge{position:absolute;top:7px;right:7px;width:9px;height:9px;border-radius:50%;
  background:var(--danger);box-shadow:0 0 0 2px rgba(0,0,0,.45)}
.gcard .gborder{position:absolute;left:0;top:0;bottom:0;width:3px;z-index:1}

#structure{display:none;flex:1;min-height:0;position:relative;overflow:hidden;background:var(--bg);touch-action:none}
#app.structure #structure{display:block}
#app.structure .stage{display:none}
.structbar{position:absolute;top:8px;left:8px;right:8px;z-index:4;display:flex;align-items:center;gap:10px;flex-wrap:wrap;pointer-events:none}
.structbar>*{pointer-events:auto}
.slegend{font-size:10.5px;color:var(--muted);background:rgba(23,27,34,.9);border:1px solid var(--line);border-radius:8px;padding:4px 8px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.slegend i{display:inline-block;width:16px;height:0;vertical-align:middle;margin-right:3px}
.sl-solid{border-top:2px solid #4a5768}.sl-dot{border-top:2px dashed #6b7480}
.sl-cross{border-top:3px dashed var(--hi)}.sl-pair{border-top:2px dashed var(--supabase)}
#structScene{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.structedges{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.structedges line{fill:none}
.e-solid{stroke:#46536440;stroke-width:1.5}
.e-solid.on{stroke:#556074;stroke-width:1.6}
.e-dot{stroke:#6b7480;stroke-width:1.2;stroke-dasharray:3 3;opacity:.6}
.e-cross{stroke:var(--hi);stroke-width:3;stroke-dasharray:9 5;opacity:.85}
.e-pair{stroke:var(--supabase);stroke-width:1.8;stroke-dasharray:6 4;opacity:.8}
.structedges .pairlbl{fill:var(--supabase);font-size:9px;opacity:.9}
#structScene.nopair .e-pair, #structScene.nopair .pairlbl{display:none}
.snode{position:absolute;cursor:pointer;box-sizing:border-box}
.snode.header{cursor:default}
.scard{width:100%;height:100%;background:var(--panel2);border:1.5px solid var(--customer);border-radius:9px;overflow:hidden;display:flex;flex-direction:column}
.scard .sthumb{width:100%;flex:1;object-fit:cover;object-position:top center;display:block;background:#0b0e13;min-height:0}
.scard .scap{padding:3px 6px;font-size:10px;line-height:1.25;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbox{width:100%;height:100%;background:var(--panel2);border:2px solid var(--erp);border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;padding:3px 6px;font-size:10.5px;line-height:1.2;color:var(--txt);overflow:hidden}
.sroot{border-color:#7cc0ff;border-width:2.5px;background:#1b2430;font-weight:700}
.serp.sroot{border-color:#ffbf7a}
.sheader{width:100%;height:100%;background:rgba(255,159,69,.08);border:1px dashed var(--erp);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:#ffd9ad;text-align:center;padding:2px 4px}
.snode.orphan .scard,.snode.orphan .sbox{border-color:var(--danger)!important;border-style:solid}
.sbadge{position:absolute;top:3px;right:3px;width:8px;height:8px;border-radius:50%;background:var(--danger);box-shadow:0 0 0 2px rgba(0,0,0,.45);z-index:2}
.snode.sel .scard,.snode.sel .sbox,.snode.sel .sroot{outline:2px solid var(--hi);outline-offset:1px}
.streelabel{position:absolute;font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap}
.sbandlabel{position:absolute;font-size:11.5px;font-weight:700;color:var(--danger);white-space:nowrap}

@media (max-width:640px){
  #panel{top:auto;bottom:0;height:72%;width:100%;max-width:100%;border-left:none;border-top:1px solid var(--line);
    transform:translateY(102%);border-radius:16px 16px 0 0}
  #panel.open{transform:translateY(0)}
  .title small{display:none}
  .legend{max-width:60vw}
  .hint{display:none}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hrow">
      <div class="title">렌테일러 사이트맵 <small id="cnt"></small></div>
      <div class="viewtog">
        <span class="vtog" id="vGallery">🖼 갤러리</span>
        <span class="vtog" id="vStruct">🌳 구조도</span>
        <span class="vtog" id="vGraph">🕸 관계도</span>
      </div>
      <div class="spacer"></div>
      <div class="ctrl" id="graphControls">
        <input id="q" type="search" placeholder="검색 (이름·경로·메모)"/>
        <span class="tog on" data-g="customer">고객웹</span>
        <span class="tog on" data-g="erp">ERP</span>
        <span class="tog on" data-g="infra">인프라</span>
        <span class="tog prob" id="probTog">⚠ 문제만</span>
        <span class="tog plain" id="resetTog">초기화</span>
      </div>
    </div>
  </header>

  <div class="findings" id="findings"></div>

  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="legend">
      <h4>데이터 출처 (노드 색)</h4>
      <div class="lg"><span class="dot" style="background:var(--supabase)"></span>Supabase 테이블</div>
      <div class="lg"><span class="dot" style="background:var(--api)"></span>API 라우트</div>
      <div class="lg"><span class="dot" style="background:var(--external)"></span>외부 서비스</div>
      <div class="lg"><span class="dot" style="background:var(--static)"></span>정적 상수</div>
      <div class="lg"><span class="dot" style="background:var(--hardcoded)"></span>하드코딩</div>
      <div class="lg"><span class="dot" style="background:var(--fs)"></span>파일시스템/기타</div>
      <div class="lg"><span class="dot" style="background:var(--none)"></span>출처 없음</div>
      <div class="sep"></div>
      <h4>그룹 (테두리·위치)</h4>
      <div class="lg"><span class="ring" style="border-color:var(--customer)"></span>고객웹</div>
      <div class="lg"><span class="ring" style="border-color:var(--erp)"></span>ERP</div>
      <div class="lg"><span class="ring" style="border-color:var(--infra)"></span>인프라</div>
      <div class="sep"></div>
      <div class="lg"><span style="width:16px;height:0;border-top:3px solid var(--hi)"></span>굵은 선 = 시스템 간 연결</div>
    </div>
    <div class="hint">드래그=이동 · 휠/핀치=확대(→페이지 썸네일) · 노드 탭=상세</div>
  </div>

  <div id="gallery"></div>

  <div id="structure">
    <div class="structbar" id="structbar">
      <span class="tog plain" id="pairTog">🔗 데이터 짝 보기</span>
      <span class="slegend"><i class="sl-solid"></i>부모-자식 <i class="sl-dot"></i>다중부모 <i class="sl-cross"></i>앱간연결 <i class="sl-pair"></i>데이터 짝</span>
    </div>
    <div id="structScene"></div>
  </div>

  <aside id="panel">
    <div class="phead">
      <span class="gtag" id="pGtag"></span>
      <div style="min-width:0">
        <h3 id="pName"></h3>
        <div class="idsub" id="pId"></div>
      </div>
      <button class="pclose" id="pClose">×</button>
    </div>
    <div class="pbody" id="pBody"></div>
  </aside>
</div>

 "shots/web_login.webp", "web:/mypage": "shots/web_mypage.webp", "web:/reviews/write": "shots/web_reviews_write.webp", "web:/reviews": "shots/web_reviews.webp", "web:/community": "shots/web_community.webp", "web:/support-preview": "shots/web_support_preview.webp", "web:/home-preview": "shots/web_home_preview.webp", "web:/simulator-compare-preview": "shots/web_simulator_compare_preview.webp", "web:/info/[id]": "shots/web_info_id.webp", "web:/blog/[slug]": "shots/web_blog_slug.webp", "web:/diagnosis/models/[slug]": "shots/web_diagnosis_models_slug.webp"};

<script>
(function(){
"use strict";
const GROUP_LABEL = {customer:"고객웹", erp:"ERP", infra:"인프라"};
const GROUP_VAR = {customer:"--customer", erp:"--erp", infra:"--infra"};
const SRC_COLOR = {supabase:"--supabase", api:"--api", external:"--external", static:"--static",
                   hardcoded:"--hardcoded", filesystem:"--fs", sqlite:"--fs", none:"--none"};
const SRC_PRIORITY = ["supabase","api","external","filesystem","sqlite","static","hardcoded"];
function cssv(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

// ---------- build node set (real + synthetic) ----------
const nodes = [];
const byId = new Map();
function addNode(n){ nodes.push(n); byId.set(n.id, n); return n; }
DATA.nodes.forEach(n=>{
  addNode({ id:n.id, group:n.group, name:n.name||n.id, role:n.role||"",
    links_to:n.links_to||[], data_sources:n.data_sources||[], features:n.features||[],
    notes:n.notes||"", synth:false });
});
// api_index lookup
const apiIdx = {web:new Map(), erp:new Map()};
(DATA.api_index.web||[]).forEach(a=>apiIdx.web.set(a.route,a));
(DATA.api_index.erp||[]).forEach(a=>apiIdx.erp.set(a.route,a));

function makeSynthApi(id){
  const m = id.match(/^(web|erp):(\/api\/.*)$/);
  const rec = m ? apiIdx[m[1]].get(m[2]) : null;
  const grp = id.startsWith("erp:") ? "erp" : "customer";
  const ds = rec ? (rec.sources||[]).map(s=>({type:s.type,ref:s.ref})) : [];
  let notes = "";
  if(rec){
    if(rec.callers && rec.callers.length) notes += "호출: "+rec.callers.join(", ");
    if(rec.external && rec.external.length) notes += (notes?" | ":"")+"외부: "+rec.external.join("; ");
    if(rec.notes) notes += (notes?" | ":"")+rec.notes;
  }
  return {id, group:grp, name:(m?m[2]:id), role:(rec?("API 엔드포인트 · "+(rec.methods||[]).join("/")):"API 엔드포인트"),
    links_to:[], data_sources:ds, features:[], notes:notes, synth:true, isApi:true};
}
// infra label resolver
function resolveEndpoint(s){
  if(byId.has(s)) return s;
  const L = s.toLowerCase();
  if(/^(web|erp):\/api\//.test(s)){ if(!byId.has(s)) addNode(makeSynthApi(s)); return s; }
  const map = [
    [/broker/, "infra:claude-broker"],
    [/n8n/, "infra:n8n"],
    [/wordpress|mycafe24/, "infra:wordpress"],
    [/ollama|gpu:/, "infra:ollama-gpu"],
    [/supabase/, "infra:supabase"],
    [/bff|cadam-pipeline|pipeline/, "infra:cadam-pipeline"],
    [/resend|solapi|telegram|anthropic|upstash|external/, "infra:external-3rd"],
  ];
  for(const [re,tid] of map){ if(re.test(L) && byId.has(tid)) return tid; }
  // synthetic actor (cron, vercel cron, misc external)
  let sid = "actor:"+s;
  if(!byId.has(sid)){
    let grp="infra";
    addNode({id:sid, group:grp, name:s, role:"외부 액터 / 트리거", links_to:[], data_sources:[],
      features:[], notes:"", synth:true, isActor:true});
  }
  return sid;
}

// ---------- edges ----------
const edges = [];
DATA.nodes.forEach(n=>{
  (n.links_to||[]).forEach(t=>{ if(byId.has(t)) edges.push({s:n.id,t:t,cross:false}); });
});
(DATA.edges_cross||[]).forEach(e=>{
  const s = resolveEndpoint(e.from), t = resolveEndpoint(e.to);
  edges.push({s,t,cross:true,kind:e.kind||"",note:e.note||"",rawFrom:e.from,rawTo:e.to});
});
// ensure every finding-referenced node exists in the graph (create synth for api paths)
(DATA.findings||[]).forEach(f=>(f.nodes||[]).forEach(id=>{ if(!byId.has(id)) resolveEndpoint(id); }));

// degree
const deg = new Map(); nodes.forEach(n=>deg.set(n.id,0));
edges.forEach(e=>{ deg.set(e.s,(deg.get(e.s)||0)+1); deg.set(e.t,(deg.get(e.t)||0)+1); });

// primary source type / color
function primarySrc(n){
  if(n.group==="infra") return "external";
  const types = new Set((n.data_sources||[]).map(d=>d.type));
  for(const p of SRC_PRIORITY){ if(types.has(p)) return p; }
  return "none";
}
nodes.forEach(n=>{ n._src = primarySrc(n); n._deg = deg.get(n.id)||0; });

// ---------- thumbnail images (from MANIFEST) ----------
const THUMB_ZOOM = 0.7;              // below this -> dots, above -> cards
const IMG = new Map();
Object.keys(MANIFEST||{}).forEach(id=>{
  if(!byId.has(id)) return;
  const im = new Image();
  im._ok = false;
  im.onload = ()=>{ im._ok = true; if(typeof draw==="function") draw(); };
  im.onerror = ()=>{ im._ok = false; };
  im.src = MANIFEST[id];
  IMG.set(id, im);
});
function hasThumb(n){ const im=IMG.get(n.id); return !!(im && im._ok); }
function isCard(n){ return cam.scale>=THUMB_ZOOM && hasThumb(n); }
function cardDims(){ const s=cam.scale; return {cw:78*s, ih:60*s, ch:17*s, r:6*s}; }

// problem nodes: notes contains ⚠  OR referenced in a finding
const findingNodes = new Set();
(DATA.findings||[]).forEach(f=>(f.nodes||[]).forEach(id=>findingNodes.add(id)));
nodes.forEach(n=>{ n._problem = (n.notes && n.notes.indexOf("⚠")>=0) || findingNodes.has(n.id); });

// ---------- layout: cluster gravity + repulsion + springs ----------
const W0=1600, H0=1000;
const CENTERS = { customer:{x:-430,y:-40}, erp:{x:430,y:-40}, infra:{x:0,y:430} };
function seed(str){ let h=2166136261; for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);} return (h>>>0)/4294967296; }
nodes.forEach(n=>{
  const c=CENTERS[n.group]||CENTERS.infra;
  const a=seed(n.id)*6.283, r=60+seed(n.id+"r")*260;
  n.x=c.x+Math.cos(a)*r; n.y=c.y+Math.sin(a)*r; n.vx=0; n.vy=0;
  n.r = 5 + Math.min(n._deg,12)*0.75 + (n.group==="infra"?3:0);
});
const adj = edges.map(e=>({a:byId.get(e.s),b:byId.get(e.t),cross:e.cross}));
function tick(alpha){
  const N=nodes.length;
  for(let i=0;i<N;i++){
    const a=nodes[i];
    // gravity to cluster
    const c=CENTERS[a.group]||CENTERS.infra;
    a.vx += (c.x-a.x)*0.010*alpha;
    a.vy += (c.y-a.y)*0.010*alpha;
    for(let j=i+1;j<N;j++){
      const b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y; let d2=dx*dx+dy*dy;
      if(d2<0.01){dx=(seed(a.id+j)-0.5); dy=(seed(b.id+i)-0.5); d2=dx*dx+dy*dy+0.01;}
      const sameC = a.group===b.group;
      const k = (sameC?2600:5200);
      const f = k/d2 * alpha;
      const d=Math.sqrt(d2);
      const fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }
  }
  for(const e of adj){
    const a=e.a,b=e.b; if(!a||!b) continue;
    let dx=b.x-a.x, dy=b.y-a.y; let d=Math.sqrt(dx*dx+dy*dy)||0.01;
    const L = e.cross?260:130;
    const f=(d-L)*0.02*alpha;
    const fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
  }
  for(const n of nodes){
    n.vx*=0.86; n.vy*=0.86;
    n.x+=Math.max(-25,Math.min(25,n.vx));
    n.y+=Math.max(-25,Math.min(25,n.vy));
  }
}
// warmup
for(let i=0;i<160;i++) tick(1 - i/220);

// ---------- camera ----------
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
let DPR=Math.min(window.devicePixelRatio||1,2);
const cam={x:0,y:0,scale:0.62};
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  cv.width=cv.clientWidth*DPR; cv.height=cv.clientHeight*DPR;
  draw();
}
function fitAll(){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  nodes.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x);maxy=Math.max(maxy,n.y);});
  const w=cv.clientWidth,h=cv.clientHeight, pad=70;
  const sx=(w-pad*2)/(maxx-minx), sy=(h-pad*2)/(maxy-miny);
  cam.scale=Math.min(sx,sy,1.1); cam.scale=Math.max(cam.scale,0.25);
  cam.x=w/2 - (minx+maxx)/2*cam.scale;
  cam.y=h/2 - (miny+maxy)/2*cam.scale;
}
function w2s(x,y){ return {x:x*cam.scale+cam.x, y:y*cam.scale+cam.y}; }
function s2w(x,y){ return {x:(x-cam.x)/cam.scale, y:(y-cam.y)/cam.scale}; }

// ---------- state ----------
const state={ groups:{customer:true,erp:true,infra:true}, problem:false, q:"", finding:null, sel:null, view:"gallery" };
function matchesQ(n){
  if(!state.q) return true;
  const s=state.q.toLowerCase();
  return (n.id+" "+n.name+" "+n.role+" "+n.notes).toLowerCase().indexOf(s)>=0;
}
function visible(n){
  if(!state.groups[n.group]) return false;
  if(state.problem && !n._problem) return false;
  return true;
}
function dimmed(n){
  if(state.finding){ return !state.finding.nodes || state.finding.nodes.indexOf(n.id)<0; }
  if(state.q){ return !matchesQ(n); }
  return false;
}
function highlighted(n){
  if(state.sel===n.id) return true;
  if(state.finding && state.finding.nodes && state.finding.nodes.indexOf(n.id)>=0) return true;
  if(state.q && matchesQ(n)) return true;
  return false;
}

// ---------- draw ----------
function draw(){
  const w=cv.width,h=cv.height;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle=cssv("--bg"); ctx.fillRect(0,0,w,h);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  // cluster halos
  for(const g of ["customer","erp","infra"]){
    if(!state.groups[g]) continue;
    const c=CENTERS[g]; const p=w2s(c.x,c.y);
    const rad=330*cam.scale;
    const col=cssv(GROUP_VAR[g]);
    const grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rad);
    grad.addColorStop(0, hexA(col,0.10)); grad.addColorStop(1, hexA(col,0));
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,6.2832); ctx.fill();
    ctx.fillStyle=hexA(col,0.5); ctx.font="600 "+(13)+"px -apple-system,sans-serif"; ctx.textAlign="center";
    ctx.fillText(GROUP_LABEL[g], p.x, p.y - rad + 16);
  }
  // edges
  ctx.lineCap="round";
  for(const e of edges){
    const a=byId.get(e.s), b=byId.get(e.t); if(!a||!b) continue;
    if(!visible(a)||!visible(b)) continue;
    const dim = dimmed(a)&&dimmed(b);
    const pa=w2s(a.x,a.y), pb=w2s(b.x,b.y);
    if(e.cross){
      ctx.strokeStyle = dim?hexA(cssv("--hi"),0.10):hexA(cssv("--hi"),0.55);
      ctx.lineWidth = Math.max(1.4, 2.4*cam.scale);
    }else{
      ctx.strokeStyle = dim?hexA(cssv("--line2"),0.25):hexA(cssv("--line2"),0.8);
      ctx.lineWidth = Math.max(0.6, 1*cam.scale);
    }
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
  }
  // nodes
  ctx.textAlign="center"; ctx.textBaseline="middle";
  const showLabels = cam.scale>0.5;
  for(const n of nodes){
    if(!visible(n)) continue;
    const p=w2s(n.x,n.y); const r=Math.max(3,n.r*cam.scale);
    const dim=dimmed(n), hi=highlighted(n);
    if(isCard(n)){ drawCard(n,p,dim,hi); continue; }
    const fill=cssv(SRC_COLOR[n._src]||"--none");
    ctx.globalAlpha = dim?0.22:1;
    // body
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,6.2832);
    ctx.fillStyle=fill; ctx.fill();
    // group ring
    ctx.lineWidth=Math.max(1.4, 2.2*cam.scale);
    ctx.strokeStyle=cssv(GROUP_VAR[n.group]); ctx.stroke();
    if(n.synth){ // dashed inner mark for synthetic
      ctx.setLineDash([2,2]); ctx.lineWidth=1; ctx.strokeStyle=hexA("#000000",0.5);
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(1.5,r*0.5),0,6.2832); ctx.stroke(); ctx.setLineDash([]);
    }
    if(n._problem){ ctx.fillStyle=cssv("--danger"); ctx.beginPath();
      ctx.arc(p.x+r*0.72,p.y-r*0.72,Math.max(1.6,r*0.32),0,6.2832); ctx.fill(); }
    if(hi){ ctx.globalAlpha=1; ctx.lineWidth=Math.max(2,3*cam.scale); ctx.strokeStyle=cssv("--hi");
      ctx.beginPath(); ctx.arc(p.x,p.y,r+3,0,6.2832); ctx.stroke(); }
    // label
    if((showLabels && !dim) || hi){
      ctx.globalAlpha = dim?0.4:0.92;
      const fs=Math.max(9, Math.min(13, 11*cam.scale+3));
      ctx.font=(hi?"600 ":"400 ")+fs+"px -apple-system,sans-serif";
      let lbl=labelOf(n);
      ctx.fillStyle=cssv("--bg"); ctx.lineWidth=3; ctx.strokeStyle=cssv("--bg");
      ctx.strokeText(lbl,p.x,p.y+r+fs*0.78);
      ctx.fillStyle=hi?cssv("--hi"):cssv("--txt");
      ctx.fillText(lbl,p.x,p.y+r+fs*0.78);
    }
    ctx.globalAlpha=1;
  }
}
function labelOf(n){
  let s=n.name||n.id;
  if(s.length>16) s=s.slice(0,15)+"…";
  return s;
}
function hexA(hex,a){
  hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  return "rgba("+r+","+g+","+b+","+a+")";
}
function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawCard(n,p,dim,hi){
  const {cw,ih,ch,r}=cardDims();
  const x=p.x-cw/2, y=p.y-(ih+ch)/2;
  const im=IMG.get(n.id);
  ctx.globalAlpha = dim?0.32:1;
  // clip + image (cover-top crop) + caption bar
  roundRect(x,y,cw,ih+ch,r); ctx.save(); ctx.clip();
  const iw=im.naturalWidth||300, ihh=im.naturalHeight||650;
  const sh=Math.min(ihh, iw*(ih/cw));           // take top slice matching card aspect
  ctx.fillStyle="#0b0e13"; ctx.fillRect(x,y,cw,ih);
  try{ ctx.drawImage(im, 0,0, iw,sh, x,y, cw,ih); }catch(_){}
  ctx.fillStyle=cssv("--panel2"); ctx.fillRect(x,y+ih,cw,ch);
  ctx.restore();
  // group border
  ctx.lineWidth=Math.max(1.4, 2*cam.scale); ctx.strokeStyle=cssv(GROUP_VAR[n.group]);
  roundRect(x,y,cw,ih+ch,r); ctx.stroke();
  // caption text
  const fs=Math.max(7, Math.min(12, 9.5*cam.scale));
  ctx.font="500 "+fs+"px -apple-system,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle=dim?cssv("--muted"):cssv("--txt");

// ---------- interaction ----------
const pointers=new Map(); let panMode=false, dragNode=null, moved=false, startPts=null, lastMid=null, lastDist=0;
function nodeAt(sx,sy){
  let best=null,bd=1e9;
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i]; if(!visible(n)) continue;
    const p=w2s(n.x,n.y);
    if(isCard(n)){
      const {cw,ih,ch}=cardDims(); const hw=cw/2, hh=(ih+ch)/2;
      if(sx>=p.x-hw && sx<=p.x+hw && sy>=p.y-hh && sy<=p.y+hh){ const d=(sx-p.x)**2+(sy-p.y)**2; if(d<bd){bd=d;best=n;} }
      continue;
    }
    const r=Math.max(8,n.r*cam.scale+6);
    const dx=sx-p.x,dy=sy-p.y,d=dx*dx+dy*dy;
    if(d<r*r && d<bd){bd=d;best=n;} }
  return best;
}
cv.addEventListener("pointerdown",e=>{
  cv.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  moved=false;
  if(pointers.size===1){
    const rect=cv.getBoundingClientRect();
    const n=nodeAt(e.clientX-rect.left, e.clientY-rect.top);
    dragNode = n; panMode = !n;
  }else if(pointers.size===2){
    dragNode=null; panMode=false;
    const p=[...pointers.values()];
    lastDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    lastMid={x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2};
  }
});
cv.addEventListener("pointermove",e=>{
  if(!pointers.has(e.pointerId)) return;
  const prev=pointers.get(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){
    const p=[...pointers.values()];
    const dist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    const mid={x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2};
    const rect=cv.getBoundingClientRect();
    const before=s2w(mid.x-rect.left, mid.y-rect.top);
    if(lastDist>0){ cam.scale=Math.max(0.18,Math.min(3, cam.scale*dist/lastDist)); }
    const after=w2s(before.x,before.y);
    cam.x += (mid.x-rect.left)-after.x; cam.y += (mid.y-rect.top)-after.y;
    if(lastMid){ cam.x+=mid.x-lastMid.x; cam.y+=mid.y-lastMid.y; }
    lastDist=dist; lastMid=mid; moved=true; draw(); return;
  }
  const dx=e.clientX-prev.x, dy=e.clientY-prev.y;
  if(Math.abs(dx)+Math.abs(dy)>2) moved=true;
  if(dragNode){ dragNode.x+=dx/cam.scale; dragNode.y+=dy/cam.scale; draw(); }
  else if(panMode){ cam.x+=dx; cam.y+=dy; draw(); }
});
function endPtr(e){
  if(!pointers.has(e.pointerId)) return;
  const wasSize=pointers.size;
  const rect=cv.getBoundingClientRect();
  pointers.delete(e.pointerId);
  if(wasSize===1 && !moved){
    const n=nodeAt(e.clientX-rect.left,e.clientY-rect.top);
    if(n) selectNode(n.id); else closePanel();
  }
  if(pointers.size<2){ lastDist=0; lastMid=null; }
  dragNode=null; panMode=false;
}
cv.addEventListener("pointerup",endPtr);
cv.addEventListener("pointercancel",endPtr);
cv.addEventListener("wheel",e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const before=s2w(mx,my);
  const f=Math.exp(-e.deltaY*0.0015);
  cam.scale=Math.max(0.18,Math.min(3,cam.scale*f));
  const after=w2s(before.x,before.y);
  cam.x+=mx-after.x; cam.y+=my-after.y; draw();
},{passive:false});

  // --- customer tree ---
  let y=54; const cByL={}; cReach.forEach(id=>{ (cByL[cLevel.get(id)]||(cByL[cLevel.get(id)]=[])).push(id); });
  const maxCL=Math.max(0,...Object.keys(cByL).map(Number));
  for(let L=0;L<=maxCL;L++){ const arr=cByL[L]||[];
    arr.sort((a,b)=>{ const pa=cPar.get(a),pb=cPar.get(b); const xa=pa&&pos[pa]?pos[pa].x:0,xb=pb&&pos[pb]?pos[pb].x:0; return xa-xb||(idPath(a)<idPath(b)?-1:1); });
    let x=30; arr.forEach(id=>{ setPos(id,x,y+L*ROWc,CWc,CHc,'cust'); x+=CWc+GAPc; }); }
  let yb=y+maxCL*ROWc+CHc;
  // customer orphans
  const cOrphY=yb+44;
  cOrph.forEach((id,i)=>{ const r=Math.floor(i/perRow),c=i%perRow; setPos(id,30+c*(CWc+GAPc),cOrphY+r*(CHc+16),CWc,CHc,'cust',{orphan:true}); });
  const cOrphRows=Math.ceil(cOrph.length/perRow)||0;
  let custEnd=cOrphY+Math.max(1,cOrphRows)*(CHc+16);
  // --- erp tree ---
  let ey=custEnd+70;
  const groupChildXs={};
  let px=30;
  eCells.filter(c=>c.level===2).forEach(c=>{ const g=c.parent; (groupChildXs[g]||(groupChildXs[g]=[])); setPos(c.id,px,ey+2*ROWe,BWe,BHe,'erp'); groupChildXs[g].push(px); px+=BWe+GAPe; });
  // headers centered over children
  eCells.filter(c=>c.level===1).forEach(c=>{ const xs=groupChildXs[c.id]||[];
    const cx=xs.length?(xs[0]+xs[xs.length-1]+BWe)/2-HWe/2:(px); setPos(c.id,cx,ey+ROWe,HWe,HHe,'erphdr',{label:c.label}); if(!xs.length){px+=HWe+GAPe;} });
  const hxs=eCells.filter(c=>c.level===1).map(c=>pos[c.id].x);
  setPos('erp:/',(Math.min(...hxs)+Math.max(...hxs)+HWe)/2-BWe/2,ey,BWe,BHe,'erproot');
  let erpB=ey+2*ROWe+BHe;
  const eOrphY=erpB+44;
  eOrph.forEach((id,i)=>{ const r=Math.floor(i/perRow),c=i%perRow; setPos(id,30+c*(BWe+GAPe),eOrphY+r*(BHe+14),BWe,BHe,'erp',{orphan:true}); });
  const eOrphRows=Math.ceil(eOrph.length/perRow)||0;
  let contentH=eOrphY+Math.max(1,eOrphRows)*(BHe+14)+40;
  let contentW=maxX+40;

  // ----- edges (SVG) -----
  const L=(x1,y1,x2,y2,cls)=>`<line class="${cls}" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
  const cBot=id=>({x:pos[id].x+pos[id].w/2,y:pos[id].y+pos[id].h}); const cTop=id=>({x:pos[id].x+pos[id].w/2,y:pos[id].y});
  const cMid=id=>({x:pos[id].x+pos[id].w/2,y:pos[id].y+pos[id].h/2});
  let edges='';
  // customer parent-child + extra parents
  cReach.forEach(id=>{ if(id==='web:/'||!pos[id]) return; const p=cPar.get(id); if(p&&pos[p]){ const a=cBot(p),b=cTop(id); edges+=L(a.x,a.y,b.x,b.y,'e-solid on'); }
    // extra parents (other customer nodes linking here)
    PAIR_CUST.forEach(o=>{ if(o!==p&&o!==id&&pos[o]&&(byId.get(o).links_to||[]).includes(id)){ const a=cMid(o),b=cMid(id); edges+=L(a.x,a.y,b.x,b.y,'e-dot'); } });
  });
  // erp parent-child (from cells)
  eCells.forEach(c=>{ if(!c.parent||!pos[c.id]||!pos[c.parent]) return; const a=cBot(c.parent),b=cTop(c.id); edges+=L(a.x,a.y,b.x,b.y,'e-solid'); });
  // cross-tree edges_cross (yellow)
  const yellowSet=new Set();
  (DATA.edges_cross||[]).forEach(e=>{ const a=toTreeNode(e.from,custSet,erpSet), b=toTreeNode(e.to,custSet,erpSet);
    if(!a||!b||a===b||!pos[a]||!pos[b]) return; const sideA=a.startsWith('erp'), sideB=b.startsWith('erp'); if(sideA===sideB) return;
    const pa=cMid(a),pb=cMid(b); edges+=L(pa.x,pa.y,pb.x,pb.y,'e-cross'); yellowSet.add(a<b?a+'|'+b:b+'|'+a); });
  // data-pairs (green) — skip if already yellow
  let greenCount=0;
  pairList.forEach(pr=>{ if(!pos[pr.c]||!pos[pr.e]) return; const key=pr.c<pr.e?pr.c+'|'+pr.e:pr.e+'|'+pr.c; if(yellowSet.has(key)) return;
    const a=cMid(pr.c),b=cMid(pr.e); edges+=L(a.x,a.y,b.x,b.y,'e-pair'); greenCount++;
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2; edges+=`<text class="pairlbl" x="${mx.toFixed(1)}" y="${my.toFixed(1)}">${esc(pr.tables.slice(0,2).join(','))}</text>`; });

  // ----- DOM -----
  let html=`<svg class="structedges" width="${contentW}" height="${contentH}">${edges}</svg>`;
  html+=`<div class="streelabel" style="left:30px;top:20px">🌳 고객웹 트리 <span style="color:var(--muted);font-weight:500;font-size:11px">· 루트=홈(/) · links_to + 전역내비(하단탭·헤더·푸터)</span></div>`;
  html+=`<div class="sbandlabel" style="left:30px;top:${(cOrphY-24).toFixed(0)}px">⚠ 미연결 ${cOrph.length}개 (홈에서 도달 불가)</div>`;
  html+=`<div class="streelabel" style="left:30px;top:${(ey-30).toFixed(0)}px">🌳 ERP 트리 <span style="color:var(--muted);font-weight:500;font-size:11px">· 루트=운영 대시보드 · 사이드바 메뉴 기반</span></div>`;
  html+=`<div class="sbandlabel" style="left:30px;top:${(eOrphY-24).toFixed(0)}px">⚠ 미연결 ${eOrph.length}개 (메뉴 밖: 상세·로그인 등)</div>`;
  for(const id in pos){ const p=pos[id]; const n=byId.get(id); const prob=n&&n._problem;
    let inner='';
    if(p.kind==='erphdr'){ inner=`<div class="sheader">${esc(p.label)}</div>`; }
    else if(p.kind==='erproot'){ inner=`<div class="sbox serp sroot">운영 대시보드</div>`; }
    else if(p.kind==='erp'){ inner=`<div class="sbox">${esc(n?(n.name||idPath(id)):idPath(id))}</div>`; }
    else { // customer
      if(hasThumb(n||{id})||IMG.has(id)){ inner=`<div class="scard${id==='web:/'?' sroot':''}"><img class="sthumb" loading="lazy" src="${esc(MANIFEST[id]||'')}" alt=""><div class="scap">${esc(n?(n.name||idPath(id)):idPath(id))}</div></div>`; }
      else { inner=`<div class="sbox" style="border-color:var(--customer)">${esc(n?(n.name||idPath(id)):idPath(id))}</div>`; }
    }
    const cls='snode '+(p.kind==='erphdr'?'header ':'')+(p.orphan?'orphan ':'')+(p.kind.startsWith('erp')?'serp':'');
    const tap = p.kind==='erphdr' ? '' : ` data-go="${esc(id)}"`;
    html+=`<div class="${cls}" style="left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px"${tap}>${prob?'<span class="sbadge"></span>':''}${inner}</div>`;
  }
  scene.innerHTML=html;
  scene.classList.add('nopair');   // 데이터 짝 기본 OFF
  scene.dataset.w=contentW; scene.dataset.h=contentH;
  scene.querySelectorAll('.snode[data-go]').forEach(el=>el.onclick=()=>selectNode(el.dataset.go));
  // metrics
  S_META.custLevels=maxCL+1; S_META.custOrph=cOrph.length; S_META.custReach=cReach.length;
  S_META.erpLevels=(eCells.some(c=>c.level===2)?3:(eCells.some(c=>c.level===1)?2:1)); S_META.erpOrph=eOrph.length; S_META.erpNav=eInNav.size;
  S_META.green=greenCount; S_META.yellow=yellowSet.size;
  S_META.custOrphList=cOrph; S_META.erpOrphList=eOrph;
  window.__STRUCT=S_META;
}
function applyStructTransform(){ document.getElementById('structScene').style.transform=`translate(${scam.tx}px,${scam.ty}px) scale(${scam.z})`; }
function fitStruct(){
  const scene=document.getElementById('structScene'); const cw=+scene.dataset.w||1000;
  const vw=document.getElementById('structure').clientWidth||390;
  scam.z=Math.max(0.25,Math.min(1,(vw-16)/cw)); scam.tx=8; scam.ty=8; applyStructTransform();
}
// pan/zoom (pointer)
(function(){ const st=document.getElementById('structure'); const P=new Map(); let moved=false,ld=0,lm=null,cap=false;
  st.addEventListener('pointerdown',e=>{ P.set(e.pointerId,{x:e.clientX,y:e.clientY}); moved=false;
    if(P.size===2){ cap=true; P.forEach((_,pid)=>{ try{st.setPointerCapture(pid);}catch(_){}}); const p=[...P.values()]; ld=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); lm={x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2}; } });
  st.addEventListener('pointermove',e=>{ if(!P.has(e.pointerId))return; const pv=P.get(e.pointerId); P.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(P.size===2){ e.preventDefault(); const p=[...P.values()]; const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); const m={x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2};
      const rect=st.getBoundingClientRect(); const bx=(m.x-rect.left-scam.tx)/scam.z, by=(m.y-rect.top-scam.ty)/scam.z;
      if(ld>0){ scam.z=Math.max(0.15,Math.min(2.5,scam.z*d/ld)); } scam.tx=(m.x-rect.left)-bx*scam.z; scam.ty=(m.y-rect.top)-by*scam.z;
      if(lm){ scam.tx+=m.x-lm.x; scam.ty+=m.y-lm.y; } ld=d; lm=m; applyStructTransform(); return; }
    const dx=e.clientX-pv.x,dy=e.clientY-pv.y; if(Math.abs(dx)+Math.abs(dy)>2){ if(!moved&&!cap){ cap=true; try{st.setPointerCapture(e.pointerId);}catch(_){}} moved=true; }
    if(moved){ scam.tx+=dx; scam.ty+=dy; applyStructTransform(); } });
  const up=e=>{ if(!P.has(e.pointerId))return; P.delete(e.pointerId); if(P.size<2){ld=0;lm=null;} if(P.size===0)cap=false; };
  st.addEventListener('pointerup',up); st.addEventListener('pointercancel',up);
  st.addEventListener('wheel',e=>{ e.preventDefault(); const rect=st.getBoundingClientRect(); const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const bx=(mx-scam.tx)/scam.z,by=(my-scam.ty)/scam.z; scam.z=Math.max(0.15,Math.min(2.5,scam.z*Math.exp(-e.deltaY*0.0015)));
    scam.tx=mx-bx*scam.z; scam.ty=my-by*scam.z; applyStructTransform(); },{passive:false});
})();
// pair toggle
document.getElementById('pairTog').onclick=function(){ const sc=document.getElementById('structScene');
  const on=sc.classList.toggle('nopair')===false; this.classList.toggle('on',on); };

// ---------- init ----------
const cnt=DATA._meta&&DATA._meta.counts?DATA._meta.counts:{};
document.getElementById("cnt").textContent =
  `노드 ${nodes.length} · 연결 ${edges.length} · 이슈 ${(DATA.findings||[]).length}`;
window.addEventListener("resize",resize);
new ResizeObserver(resize).observe(cv);
fitAll(); resize();
setView('gallery');   // 기본 진입 = 갤러리
})();
</script>
